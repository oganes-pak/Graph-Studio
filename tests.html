<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тесты Graph Studio v13</title>
  <style>
    body { margin: 0; padding: 24px; font-family: Inter, Arial, sans-serif; background: #eef2f5; color: #17202a; }
    main { max-width: 900px; margin: 0 auto; padding: 22px; border-radius: 16px; background: #fff; box-shadow: 0 16px 42px rgba(0,0,0,.1); }
    h1 { margin-top: 0; }
    #summary { padding: 12px; border-radius: 10px; background: #edf2f6; font-weight: 800; }
    #results { display: grid; gap: 8px; padding: 0; list-style: none; }
    .pass, .fail { padding: 10px 12px; border-radius: 9px; }
    .pass { background: #e7f4e6; color: #24531f; }
    .fail { background: #f8e4e2; color: #7c1d18; }
    #fixture { position: fixed; left: -10000px; top: 0; width: 640px; height: 480px; }
    #fixture canvas { width: 640px; height: 480px; }
  </style>
</head>
<body>
  <main>
    <h1>Автотесты Graph Studio v13</h1>
    <p>Табличные DDT-проверки запускаются прямо в браузере. Никакой магии, только организованное недоверие к собственному коду.</p>
    <div id="summary">Запуск…</div>
    <ul id="results"></ul>
  </main>
  <div id="fixture"></div>
  <script type="module" src="./tests.js"></script>
</body>
</html>
